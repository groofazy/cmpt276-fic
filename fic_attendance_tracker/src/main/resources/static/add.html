<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-md-4">
                <div class="mt-4">
                    <a th:href="@{/ratings/view}" class="btn btn-secondary">Back to List</a>
                </div>                   
                    <h1 class="text-center mt-5 mb-4">New Account</h1>
                    
                    <!-- <div th:if="${nameError}" class="text-danger small" th:text="${nameError}"></div>
                    <div th:if="${emailError}" class="text-danger small" th:text="${emailError}"></div> -->

                    <form action="/users/add" method="post">

                        <div class="mb-3">
                            <label for="name">Name:</label>
                            <input type="text" name="name" class="form-control form-control-lg" placeholder="Username">
                        </div>

                        <div class="mb-3">
                            <label for="password">Password:</label>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Password">
                        </div>

                        <div class="mb-3">
                            <label for="role">Role:</label>
                            <select name="role" class="form-select" id="role">
                                <option value="STUDENT">Student</option>
                                <option value="TEACHER">Teacher</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <input class="btn btn-primary" type="submit" value="CREATE RATING" />
                        </div>
                    </form>
                </div>
            </div>
        </div>
    
</body>
</html>
