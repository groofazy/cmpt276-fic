<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Professor Dashboard </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel = "stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <h1> FIC Attendance Tracker </h1>
    <h2> Professor Dashboard </h2>

    <hr>

    <p th:text=" 'Welcome, ' +${user.name} +'!'"></p>

    <div class="container">
        <div class="section">
           <h3> Attendance Controls </h3>

           <div class="controls">

            <form th:action="@{/attendance/start}" method="post">
              <button type="submit"> Start Attendance </button>
            </form>

            <form th:action="@{/attendance/end}" method="post">
              <button type="submit"> End Attendance  </button>
            </form>

            <a th:href="@{/users/layout}">
             <button>Change Seating Layout</button>
            </a>

        </div>
    </div>

    <!-- Classroom Map Placeholder -->
    <div class="section">

        <h3>Classroom Map</h3>
        <p>Seating layout will appear here.</p>

    </div>

    <div class="section">

       <h3> Current Attendance </h3>
       <table border="1">
         <tr>
            <th>Student Name</th>
            <th>Attendance Status</th>
         </tr>

         <tr th:each="student : ${students}">
            <td th:text="${student.name}">  </td>
            <td th:text="${student.attendanceStatus}">  </td>
         </tr>


        </table>
    </div>

    <div class="section">

        <a th:href="@{/logout}">
            <button> Logout </button>
        </a>
    </div>

</div>

</body>
</html>
