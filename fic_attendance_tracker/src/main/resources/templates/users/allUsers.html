<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <h1>FIC ATTENDANCE TRACKER ACCOUNTS</h1>
                <div class="mt-4">
                    <a th:href="@{/}" class="btn btn-secondary">back</a> <!-- Returns back to index.html page-->
                </div>           

                <ul>
                    <li class="account-details" th:each="user:${us}"> 
                        <span th:text="|Name: ${user.name}|"></span> <br>
                        <span th:text="|Password: ${user.password}|"></span> <br>
                        <span th:text="|Role: ${user.role}|"></span> <br>
                    </li>
                </ul>
            </div>
        </div>
    </main>
    
</body>
</html>
