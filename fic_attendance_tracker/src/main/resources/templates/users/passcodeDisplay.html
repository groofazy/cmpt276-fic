<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Attendance Screen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f4f6f8;">

<div class="container text-center mt-5">

    <!-- CLASS INFO -->
    <h2 th:text="${classMap.className}" style="font-weight:bold;"></h2>
    <p th:text="${classMap.lectureDate}" style="font-size:18px;"></p>
    <p th:text="'Instructor: ' + ${sessionUser.name}" style="font-size:18px;"></p>

    <!-- BIG PASSCODE -->
    <div style="margin-top:60px;">
        <h1 style="font-size:120px; font-weight:bold; color:#0d6efd;"
            th:text="${classMap.passcode}">
        </h1>
    </div>

    <p style="font-size:20px; margin-top:20px;">
        Students: Enter this passcode to mark attendance
    </p>

    <!-- BACK BUTTON -->
    <a th:href="@{/users/teacher}">
        <button class="btn btn-secondary mt-4">Back to Dashboard</button>
    </a>

</div>

</body>
</html>
