<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Professor - FIC Attendance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-graduation-cap"></i> FIC Tracker</h3>
            </div>
            <ul class="sidebar-nav">
                <li><a th:href="@{/admin/dashboard}"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                <li><a th:href="@{/admin/students}"><i class="fas fa-users"></i><span>Student Management</span></a></li>
                <li><a th:href="@{/admin/professors}" class="active"><i class="fas fa-chalkboard-user"></i><span>Professor Management</span></a></li>
                <li><a th:href="@{/admin/classrooms}"><i class="fas fa-door-open"></i><span>Classroom Management</span></a></li>
                <li><a th:href="@{/admin/reports}"><i class="fas fa-file-chart-line"></i><span>Attendance Reports</span></a></li>
                <li><a th:href="@{/admin/settings}"><i class="fas fa-cog"></i><span>Settings</span></a></li>
                <li style="margin-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2);"><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <div class="topbar">
                <h2>Edit Professor</h2>
            </div>

            <div class="content">
                <div class="section">
                    <form th:action="@{/admin/professors/edit/{id}(id=${professor.uid})}" method="post" class="form-container">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name:</label>
                            <input type="text" name="name" id="name" class="form-control" th:value="${professor.name}" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password:</label>
                            <input type="password" name="password" id="password" class="form-control" th:value="${professor.password}" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Update Professor</button>
                            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
