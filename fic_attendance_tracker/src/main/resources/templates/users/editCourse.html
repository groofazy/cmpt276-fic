<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Courses - FIC Attendance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-graduation-cap"></i> FIC Tracker</h3>
            </div>
            <ul class="sidebar-nav">
                <li><a th:href="@{/admin/dashboard}"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                <li><a th:href="@{/admin/students}"><i class="fas fa-users"></i><span>Student Management</span></a></li>
                <li><a th:href="@{/admin/professors}"><i class="fas fa-chalkboard-user"></i><span>Professor Management</span></a></li>
                <li><a th:href="@{/admin/courses}" class="active"><i class="fas fa-book"></i><span>Course Management</span></a></li>
                <li><a th:href="@{/admin/classrooms}"><i class="fas fa-door-open"></i><span>Classroom Management</span></a></li>
                <li><a th:href="@{/admin/reports}"><i class="fas fa-file-chart-line"></i><span>Attendance Reports</span></a></li>
                <li><a th:href="@{/admin/settings}"><i class="fas fa-cog"></i><span>Settings</span></a></li>
                <li style="margin-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.2);"><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <div class="topbar">
                <h2>Edit Course</h2>
            </div>

            <div class="content">
                <div class="section">
                    <form th:action="@{/courses/edit/{id}(id=${course.courseId})}" method="post" class="form-container">
                        <div class="mb-3">
                            <label for="subject">Course Subject:</label>
                            <select name="subject" class="form-select" id="subject">
                                <option value="ACMA">ACMA</option>  
                                <option value="ALS">ALS</option>
                                <option value="APMA">APMA</option>
                                <option value="ARAB">ARAB</option>
                                <option value="ARCH">ARCH</option>
                                <option value="ASC">ASC</option>
                                <option value="BISC">BISC</option>
                                <option value="BOT">BOT</option>
                                <option value="BPK">BPK</option>
                                <option value="BUEC">BUEC</option>
                                <option value="BUS">BUS</option>
                                <option value="CA">CA</option>
                                <option value="CENV">CENV</option>
                                <option value="CHEM">CHEM</option>
                                <option value="CHIN">CHIN</option>
                                <option value="CMNS">CMNS</option>
                                <option value="CMPT">CMPT</option>
                                <option value="COGS">COGS</option>
                                <option value="CRIM">CRIM</option>
                                <option value="DATA">DATA</option>
                                <option value="DDP">DDP</option>
                                <option value="DEVS">DEVS</option>
                                <option value="DIAL">DIAL</option>
                                <option value="DMED">DMED</option>
                                <option value="EAS">EAS</option>
                                <option value="EASC">EASC</option>
                                <option value="EBP">EBP</option>
                                <option value="ECO">ECO</option>
                                <option value="ECON">ECON</option>
                                <option value="EDPR">EDPR</option>
                                <option value="EDUC">EDUC</option>
                                <option value="ENGL">ENGL</option>
                                <option value="ENSC">ENSC</option>
                                <option value="ENV">ENV</option>
                                <option value="EVSC">EVSC</option>
                                <option value="EXCH">EXCH</option>
                                <option value="EXPL">EXPL</option>
                                <option value="FAL">FAL</option>
                                <option value="FAN">FAN</option>
                                <option value="FASS">FASS</option>
                                <option value="FEP">FEP</option>
                                <option value="FNLG">FNLG</option>
                                <option value="FNST">FNST</option>
                                <option value="FPA">FPA</option>
                                <option value="FREN">FREN</option>
                                <option value="GA">GA</option>
                                <option value="GDST">GDST</option>
                                <option value="GEOG">GEOG</option>
                                <option value="GERM">GERM</option>
                                <option value="GERO">GERO</option>
                                <option value="GLP">GLP</option>
                                <option value="GRAD">GRAD</option>
                                <option value="GRK">GRK</option>
                                <option value="GS">GS</option>
                                <option value="GSWS">GSWS</option>
                                <option value="HIST">HIST</option>
                                <option value="HS">HS</option>
                                <option value="HSCI">HSCI</option>
                                <option value="HUM">HUM</option>
                                <option value="IAT">IAT</option>
                                <option value="INDG">INDG</option>
                                <option value="INLG">INLG</option>
                                <option value="INS">INS</option>
                                <option value="IS">IS</option>
                                <option value="ISPO">ISPO</option>
                                <option value="ITAL">ITAL</option>
                                <option value="JAPN">JAPN</option>
                                <option value="KIN">KIN</option>
                                <option value="LANG">LANG</option>
                                <option value="LAS">LAS</option>
                                <option value="LBRL">LBRL</option>
                                <option value="LBST">LBST</option>
                                <option value="LING">LING</option>
                                <option value="LS">LS</option>
                                <option value="MACM">MACM</option>
                                <option value="MASC">MASC</option>
                                <option value="MATH">MATH</option>
                                <option value="MBB">MBB</option>
                                <option value="MIL">MIL</option>
                                <option value="MPP">MPP</option>
                                <option value="MSE">MSE</option>
                                <option value="MSSC">MSSC</option>
                                <option value="NEUR">NEUR</option>
                                <option value="NUSC">NUSC</option>
                                <option value="ONC">ONC</option>
                                <option value="PERS">PERS</option>
                                <option value="PHIL">PHIL</option>
                                <option value="PHYS">PHYS</option>
                                <option value="PLAN">PLAN</option>
                                <option value="PLCY">PLCY</option>
                                <option value="POL">POL</option>
                                <option value="PORT">PORT</option>
                                <option value="PSYC">PSYC</option>
                                <option value="PUB">PUB</option>
                                <option value="PUNJ">PUNJ</option>
                                <option value="REM">REM</option>
                                <option value="RISK">RISK</option>
                                <option value="SA">SA</option>
                                <option value="SAR">SAR</option>
                                <option value="SCD">SCD</option>
                                <option value="SCI">SCI</option>
                                <option value="SD">SD</option>
                                <option value="SDA">SDA</option>
                                <option value="SEE">SEE</option>
                                <option value="SPAN">SPAN</option>
                                <option value="STAT">STAT</option>
                                <option value="TECH">TECH</option>
                                <option value="TEKX">TEKX</option>
                                <option value="TRSS">TRSS</option>
                                <option value="UGRAD">UGRAD</option>
                                <option value="URB">URB</option>
                                <option value="WDA">WDA</option>
                                <option value="WKTM">WKTM</option>
                                <option value="WL">WL</option>
                                <option value="WS">WS</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="number">Course Number:</label>
                            <input type="text" 
                                name="number" 
                                id="number"
                                class="form-control form-control-lg" 
                                required 
                                maxlength="3" 
                                pattern="\d{1,3}" 
                                title="Invalid course number"
                                oninvalid="this.setCustomValidity('Invalid course number')"
                                oninput="this.setCustomValidity('')">
                        </div>

                        <div class="mb-3">
                            <label>Course Times:</label>
                            <div id="time-list" class="mb-3 d-flex flex-column gap-2"></div>
                            <div id="hidden-times-container"></div>
                            <button type="button" id="btn-open-modal" class="btn-course">Add course time</button>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Update Course</button>
                            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Course Time Input Form Pop-Up -->
    <div id="time-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box time-modal-box">
            <div class="modal-header">
                <h5>Meeting Time</h5>
                <span id="btn-close-modal" class="close-btn">&times;</span>
            </div>

            <div class="day-selector mb-4">
                <label class="day-item"><div class="day-label">Mon</div><input type="radio" name="day" value="Monday"><div class="custom-radio"></div></label>
                <label class="day-item"><div class="day-label">Tues</div><input type="radio" name="day" value="Tuesday"><div class="custom-radio"></div></label>
                <label class="day-item"><div class="day-label">Wed</div><input type="radio" name="day" value="Wednesday"><div class="custom-radio"></div></label>
                <label class="day-item"><div class="day-label">Thurs</div><input type="radio" name="day" value="Thursday"><div class="custom-radio"></div></label>
                <label class="day-item"><div class="day-label">Fri</div><input type="radio" name="day" value="Friday"><div class="custom-radio"></div></label>
                <label class="day-item"><div class="day-label">Sat</div><input type="radio" name="day" value="Saturday"><div class="custom-radio"></div></label>
                <label class="day-item"><div class="day-label">Sun</div><input type="radio" name="day" value="Sunday"><div class="custom-radio"></div></label>
            </div>

            <div class="time-input-group mb-3">
                <label>Start Time</label>
                <div class="time-controls">
                    <select id="start-hh">
                        <option th:each="i : ${#numbers.sequence(0, 23)}" 
                                th:value="${#numbers.formatInteger(i, 2)}" 
                                th:text="${#numbers.formatInteger(i, 2)}">
                        </option>
                    </select> 
                    <span class="fw-bold mx-1">:</span>
                    <select id="start-mm">
                        <option th:each="i : ${#numbers.sequence(0, 59)}" 
                                th:value="${#numbers.formatInteger(i, 2)}" 
                                th:text="${#numbers.formatInteger(i, 2)}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="time-input-group mb-4">
                <label>End Time</label>
                <div class="time-controls">
                    <select id="end-hh">
                        <option th:each="i : ${#numbers.sequence(0, 23)}" 
                                th:value="${#numbers.formatInteger(i, 2)}" 
                                th:text="${#numbers.formatInteger(i, 2)}">
                        </option>
                    </select> 
                    <span class="fw-bold mx-1">:</span>
                    <select id="end-mm">
                        <option th:each="i : ${#numbers.sequence(0, 59)}" 
                                th:value="${#numbers.formatInteger(i, 2)}" 
                                th:text="${#numbers.formatInteger(i, 2)}">
                        </option>
                    </select>
                </div>
            </div>

            <button type="button" id="btn-save-time" class="btn btn-primary">Save Time</button>
        </div>
    </div>

    <script th:src="@{/js/course.js}"></script>
</body>
</html>
