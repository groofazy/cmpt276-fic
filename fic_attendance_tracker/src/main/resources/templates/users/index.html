<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendEase |FIC Attendance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="container py-5">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-9 col-lg-7">
                <div class="dashboard-section text-center shadow-sm">
                    <div class="mb-4">
                        <h1 class="display-3 fw-bold mb-2">AttendEase</h1>
                        <p class="lead text-muted mb-1">FIC Attendance Tracker</p>
                    </div>

                    <div class="d-grid gap-3 mt-4">
                        <a th:href="@{/users/login}" class="btn btn-primary btn-lg py-3">
                            Login to FIC Account
                        </a>

                        <a th:href="@{/users/add}" class="btn btn-outline-primary btn-lg py-3">
                            Add New FIC Account
                        </a>

                        <!-- <a th:href="@{/users/view}" class="btn btn-outline-secondary btn-lg py-3">
                            View All FIC Accounts
                        </a> -->
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
