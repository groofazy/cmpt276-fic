<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="mb-0">Student Dashboard</h1>
                        <a href="/logout" class="btn btn-danger">Logout</a>
                    </div>

                    <h3 class="mb-3">Welcome, <span th:text="${user.name}">Student</span>!</h3>
                    <p class="text-muted">You are successfully logged into the FIC Attendance Tracker.</p>

                    <hr>

                    <h4 class="mb-3">Account Information</h4>

                    <div class="mb-2">
                        <strong>User ID:</strong>
                        <span th:text="${user.uid}">1</span>
                    </div>

                    <div class="mb-2">
                        <strong>Username:</strong>
                        <span th:text="${user.name}">student_name</span>
                    </div>

                    <div class="mb-2">
                        <strong>Role:</strong>
                        <span th:text="${user.role}">STUDENT</span>
                    </div>

                    <div class="mt-4 alert alert-info">
                        Student view loaded successfully. Additional attendance features can be connected here later.
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
