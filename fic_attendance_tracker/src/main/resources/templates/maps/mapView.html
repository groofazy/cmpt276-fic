<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="mt-4">
                    <a th:href="@{/back}" class="btn btn-secondary">Back</a>
                </div>

                <h2 class="text-center mt-4 mb-3" th:text="|${classMap.className} (${classMap.lectureDate})|"></h2>

                <div class="text-center">
                    <p class="text-danger" th:if="${error}" th:text="${error}"></p>
                </div>

                <!-- Instruction Text -->
                <p id="instruction-text" class="text-center text-success instruction-text"
                   th:if="${sessionUser.role.name() == 'STUDENT' and verified}">
                    Please select your seat to mark attendance.
                </p>



                <div class="seating-grid"
                     th:if="${sessionUser.role.name() != 'STUDENT' or verified}">

                    <div class="text-center fw-bold classroom-front">
                        FRONT OF CLASSROOM
                    </div> 

                    <div class="seat-row" th:each="i : ${#numbers.sequence(1, classMap.numRow)}">

                        <div class="row-label" th:text="${i}"></div>

                        <div class="desk-group" th:each="j : ${#numbers.sequence(1, 4)}">
                            <button type="button"
                                    th:each="k : ${#numbers.sequence(1, 3)}"
                                    th:with="letter=${'ABCDEFGHIJKL'.substring((j - 1) * 3 + (k - 1), (j - 1) * 3 + k)}"
                                    th:data-row="${i}"
                                    th:data-number="${letter}"
                                    th:text="${letter}"
                                    class="seat seat-available">
                            </button>
                        </div>

                    </div>
                </div>

                <div class="text-center mt-4" th:if="${sessionUser.role.name() == 'STUDENT' and verified}">
                    <button id="confirm-btn" class="btn btn-primary btn-lg" style="display:none">
                        Confirm Seat
                    </button>
                </div>

                <div class="text-center mt-3" th:if="${sessionUser.role.name() == 'STUDENT' and verified and hasSeat}">
                    <form th:action="@{/seat/cancel}" method="post">
                        <input type="hidden" name="mapId" th:value="${classMap.mapId}">
                        <button type="submit" class="btn btn-danger">
                            Cancel My Confirmed Seat
                        </button>
                    </form>
                </div>

            </div>
        </div>
    

    <div id="confirm-modal" class="modal-overlay" style="display:none"
         th:if="${sessionUser.role.name() == 'STUDENT'}">
        <div class="modal-box">
            <h5>Confirm Your Seat</h5>
            <p>You selected seat <strong id="modal-seat-label"></strong></p>
            <div class="modal-actions">
                <form id="confirm-form" th:action="@{/seat/save}" method="post">
                    <input type="hidden" name="mapId" th:value="${classMap.mapId}">
                    <input type="hidden" name="seatRow" id="selected-row">
                    <input type="hidden" name="seatNumber" id="selected-number">

                    <button type="submit" id="modal-yes" class="btn btn-success">Yes, Confirm</button>
                </form>
                <button id="modal-no" class="btn btn-secondary">No, Cancel</button>
            </div>
        </div>
    </div>

    <div id="map-data" style="display: none;"
         th:data-map-id="${classMap.mapId}"
         th:data-user-id="${sessionUser != null ? sessionUser.uid : 0}"
         th:data-user-name="${sessionUser != null ? sessionUser.name : ''}"
         th:data-user-role="${sessionUser != null ? sessionUser.role.name() : ''}">
    </div>

    <script th:src="@{/js/map.js}"></script>
</body>
</html>
