<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/script.js}" defer></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="mt-4">
                    <a th:href="@{/back}" class="btn btn-secondary">Back</a>
                </div>

                <h2 class="text-center mt-5 mb-3" th:text="|${classMap.className} (${classMap.lectureDate})|"></h2>

                <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success text-center" th:text="${success}"></div>

                <div class="classroom-wrapper">
                    <div class="front-label">FRONT OF CLASSROOM</div>

                    <div class="legend text-center mb-3">
                        <span class="me-3"><span class="legend-box available-box"></span> Available</span>
                        <span class="me-3"><span class="legend-box occupied-box"></span> Occupied</span>
                        <span class="me-3"><span class="legend-box selecting-box"></span> Selecting</span>
                        <span><span class="legend-box mine-box"></span> My Seat</span>
                    </div>

                    <form id="seatForm" th:action="@{/maps/selectSeat}" method="post">
                        <input type="hidden" name="mapId" th:value="${classMap.mapId}">
                        <input type="hidden" name="seatIndex" id="seatIndexInput">

                        <div class="seating-grid">
                            <div class="seat-row" th:each="i : ${#numbers.sequence(1, 4)}">
                                <div class="desk-group" th:each="j : ${#numbers.sequence(1, 4)}">
                                    <button type="button"
                                            th:each="k : ${#numbers.sequence(1, 3)}"
                                            th:with="idx=${((i - 1) * 12) + ((j - 1) * 3) + (k - 1)}"
                                            class="seat"
                                            th:classappend="| ${seatClasses[idx]} |"
                                            th:data-row="${i}"
                                            th:data-desk="${j}"
                                            th:data-seat="${k}"
                                            th:data-seat-index="${idx}"
                                            th:disabled="${seatClasses[idx] == 'occupied'}">
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 text-center">
                            <button id="confirmBtn" type="submit" class="btn btn-secondary" disabled>
                                Confirm Attendance
                            </button>

                            <button id="cancelBtn" type="button" class="btn btn-secondary ms-2" disabled>
                                Cancel Selection
                            </button>
                        </div>
                    </form>

                    <div id="statusMsg" class="mt-3 text-center"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
