<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/script.js}" defer></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="mt-4">
                    <a th:href="@{/back}" class="btn btn-secondary">Back</a> <!-- Returns back to Corresponding Dashboard page-->
                </div>
                <h2 class="text-center mt-5 mb-4" th:text="|${classMap.className} (${classMap.lectureDate})|"></h2>

                <div>
                    <div class="text-center mt-5 mb-4 fw-bold">FRONT OF CLASSROOM</div>

                    <div class="seating-grid">
                        <div class="row" th:each="i : ${#numbers.sequence(1, classMap.numRow)}">
                            <div class="desk-group" th:each="j : ${#numbers.sequence(1, 4)}">
                                <div th:each="k : ${#numbers.sequence(1, 3)}">
                                    <button type="button" class="seat" th:data-row="${i}" th:data-desk="${j}" th:data-seat="${k}"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
