<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/script.js}" defer></script>
</head>
<body>
    <main class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="mb-3">
                    <a th:href="@{/back}" class="btn btn-secondary">Back</a>
                </div>

                <h2 class="text-center mb-2" th:text="|${classMap.className} (${classMap.lectureDate})|"></h2>
                <p class="text-center text-muted">Select one seat to attend this class.</p>

                <div class="dashboard-section">
                    <div class="text-center mb-3 fw-bold">FRONT OF CLASSROOM</div>

                    <div class="text-center mb-3">
                        <span class="me-3">
                            <span class="legend-box"></span> Available
                        </span>
                        <span>
                            <span class="legend-box selected-box"></span> Selected
                        </span>
                    </div>

                    <div class="seating-grid">
                        <div class="row" th:each="i : ${#numbers.sequence(1, classMap.numRow)}">
                            <div class="desk-group" th:each="j : ${#numbers.sequence(1, 4)}">
                                <div th:each="k : ${#numbers.sequence(1, 3)}">
                                    <button type="button"
                                            class="seat"
                                            th:data-row="${i}"
                                            th:data-desk="${j}"
                                            th:data-seat="${k}">
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 text-center">
                        <button id="confirmBtn" class="btn btn-success" disabled>
                            Confirm Attendance
                        </button>
                    </div>

                    <div id="statusMsg" class="mt-3 text-center"></div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
