<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-md-4">
                <div class="mt-4">
                    <a th:href="@{/users/teacher}" class="btn btn-secondary">Back</a> <!-- Returns back to Teacher View Dashboard page-->
                </div>                   
                    <h1 class="text-center mt-5 mb-4">Create New Class</h1>

                    <form action="/maps/create" method="post">

                        <div class="mb-3">
                            <label for="className">Class Name:</label>
                            <input type="text" name="className" class="form-control form-control-lg" placeholder="Class Name (E.g: CMPT 276)" required>
                        </div>

                        <div class="mb-3">
                            <label for="lectureDate">Lecture Date:</label>
                            <input type="date" name="lectureDate" class="form-control form-control-lg" required>
                        </div>

                        <div class="mb-3">
                            <label for="numRow">Number of Rows:</label>
                            <input type="number" name="numRow" class="form-control form-control-lg" min="1" max="10" required>
                            <small class="text-muted">Each row will contain 4 blocks of 3 seats.</small>
                        </div>

                        <div class="d-grid gap-2">
                            <input class="btn btn-primary" type="submit" value="Generate Map" />
                        </div>
                    </form>
                </div>
            </div>
        </div>
    
</body>
</html>
